apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "drop-the-mic.fullname" . }}-operator
  labels:
    {{- include "drop-the-mic.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "drop-the-mic.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "drop-the-mic.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "drop-the-mic.fullname" . }}-operator
      containers:
        - name: operator
          image: {{ include "drop-the-mic.operatorImage" . }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - --llm-provider={{ .Values.operator.llm.provider }}
            - --llm-secret={{ .Values.operator.llm.secretRef }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
