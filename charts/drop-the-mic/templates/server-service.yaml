{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "drop-the-mic.fullname" . }}-server
  labels:
    {{- include "drop-the-mic.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "drop-the-mic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
{{- end }}
