operator:
  image:
    repository: ghcr.io/drop-the-mic/operator
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  llm:
    provider: claude  # claude | gemini | openai
    secretRef: dtm-llm-secret

ui:
  enabled: true
  image:
    repository: ghcr.io/drop-the-mic/server
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    className: nginx
    host: dtm.example.com
    annotations: {}
    tls: []
  gateway:
    enabled: false
    gatewayRef:
      name: ""
      namespace: ""
  auth:
    enabled: false
    type: basic  # basic | oidc
